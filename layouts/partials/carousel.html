<section>
  <div class="home-carousel">
      <div class="dark-mask"></div>
      <div class="container">
          <div class="homepage owl-carousel">
              {{ range sort .Site.Data.carousel "weight" }}
              <div class="item">
                  <div class="row">
                      <div class="col-sm-12">
                          <h1>{{ .title }}</h1>
                          {{ .description | safeHTML }}
                          <img class="img-responsive" src="{{ .image }}" alt="{{ .alt }}">
                      </div>
                  </div>
              </div>
              {{ end }}
          </div>
      </div>
  </div>
</section>
