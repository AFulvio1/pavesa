<!-- USAGE: use url to get the URL of the YT-Video and img-low & img-high for the lazyloading -->

<div class="videoWrapper embed-responsive embed-responsive-16by9" data-yt-url="{{.Get "url"}}">
    <img src="{{.Get "img-low"}}" class="img-responsive play-youtube-video" loading=lazy alt="{{.Get "alt"}}"/>
</div>
