<!-- USAGE: use imgPrima/Durante/Dopo for get the image of the work, alPrima/Durante/Dopo for the description for the alternative of the image -->

<div class="container">
    <div class="row">
        <div class="col-sm-4">
            <img src="{{.Get "imgPrima"}}" alt="{{.Get "altPrima"}}" loading=lazy class="img-responsive" width=400 height=400/>
            <div class="text-center"><h3>PRIMA</h3></div>
        </div>
        <div class="col-sm-4">
            <img src="{{.Get "imgDurante"}}" alt="{{.Get "altDurante"}}" loading=lazy class="img-responsive" width=400 height=400/>
            <div class="text-center"><h3>DURANTE</h3></div>
        </div>
        <div class="col-sm-4">
            <img src="{{.Get "imgDopo"}}" alt="{{.Get "altDopo"}}" loading=lazy class="img-responsive" width=400 height=400/>
            <div class="text-center"><h3>DOPO</h3></div>
        </div>
    </div>
</div>
